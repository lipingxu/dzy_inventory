name: Scheduled Price Sync

on:
  schedule:
    # Beijing time 07:07 / 11:23 / 14:47 / 17:17
    # UTC:        23:07 / 03:23 / 06:47 / 09:17
    - cron: "7 23 * * *"
    - cron: "23 3 * * *"
    - cron: "47 6 * * *"
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate secret
        run: |
          if [ -z "${DZY_CURL_COMMAND}" ]; then
            echo "Missing secret: DZY_CURL_COMMAND"
            exit 1
          fi
        env:
          DZY_CURL_COMMAND: ${{ secrets.DZY_CURL_COMMAND }}

      - name: Record last checked timestamp
        run: |
          date '+%Y-%m-%d %H:%M:%S %Z' > last_checked.txt

      - name: Run sync
        run: |
          printf '%s' "${DZY_CURL_COMMAND}" > duozhuayu_source.txt
          python3 auto_sync_data.py duozhuayu_source.txt
          rm -f duozhuayu_source.txt
        env:
          DZY_CURL_COMMAND: ${{ secrets.DZY_CURL_COMMAND }}

      - name: Commit and push updates
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last_checked.txt inventory_auto.csv report_auto.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "chore: scheduled price sync"
          git push
